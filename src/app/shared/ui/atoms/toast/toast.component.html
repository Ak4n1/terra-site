<div class="ui-toast" [ngClass]="variantClass" role="status" aria-live="polite">
  <button type="button" class="ui-toast__close" aria-label="Close toast" (click)="dismiss()">&times;</button>
  <div class="ui-toast__icon">
    <lucide-icon [img]="icon" class="ui-toast__icon-svg"></lucide-icon>
  </div>
  <div class="ui-toast__message">{{ message }}</div>
</div>
