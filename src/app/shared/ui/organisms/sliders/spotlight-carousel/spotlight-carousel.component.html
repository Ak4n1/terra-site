<div class="mnt-80">
  <div class="spotlight-carousel__mobile-fallback">
    <img *ngIf="resolvedSlides[0]; else emptyFallback" class="spotlight-carousel__mobile-image" [src]="resolvedSlides[0].imageSrc" alt="" />
    <ng-template #emptyFallback>
      <div class="spotlight-carousel__mobile-image spotlight-carousel__mobile-image--empty"></div>
    </ng-template>
  </div>

  <div #wrapperElement [id]="wrapperId" class="rev_slider_wrapper fullscreen-container" data-alias="photography-carousel48" style="padding:0;">
    <div #sliderElement [id]="sliderId" class="rev_slider fullscreenbanner" style="display:none;" data-version="5.0.7">
      <ul>
        <li
          *ngFor="let slide of resolvedSlides; let i = index"
          [attr.data-index]="'rs-' + (185 + i)"
          [attr.data-transition]="getTransition(i)"
          data-slotamount="7"
          data-easein="default"
          data-easeout="default"
          data-masterspeed="1500"
          [attr.data-thumb]="slide.thumbSrc"
          data-rotate="0"
          data-saveperformance="off">
          <img [src]="slide.imageSrc" alt="" data-bgposition="center center" data-bgfit="contain" data-bgrepeat="no-repeat" class="rev-slidebg" data-no-retina>
          <div class="terra-slide-caption" *ngIf="slide.titleKey || slide.descriptionKey">
            <h3 class="terra-slide-caption__title">{{ languageService.t(slide.titleKey || 'heroWelcomeTitle') }}</h3>
            <p class="terra-slide-caption__description">{{ languageService.t(slide.descriptionKey || 'heroWelcomeDescription') }}</p>
          </div>
        </li>
      </ul>
      <div class="tp-bannertimer tp-bottom" style="visibility: hidden !important;"></div>
    </div>
  </div>
</div>
