<div class="modal-backdrop" [class.modal-backdrop--open]="open" [attr.aria-hidden]="!open" (click)="close()">
  <div
    class="modal-shell"
    [class.modal-shell--open]="open"
    [class.modal-shell--large]="size === 'large'"
    [class.modal-shell--small]="size === 'small'"
    (click)="$event.stopPropagation()">
    <div class="modal-panel">
      <div class="modal-header">
        <button type="button" class="modal-close" aria-label="Close" (click)="close()">&times;</button>
        <h4 class="modal-title">{{ title }}</h4>
      </div>

      <div class="modal-body">
        <ng-content select="[modal-body]"></ng-content>
      </div>

      <div class="modal-footer">
        <ng-content select="[modal-footer]"></ng-content>
      </div>
    </div>
  </div>
</div>
