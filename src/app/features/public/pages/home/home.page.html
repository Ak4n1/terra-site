<section class="home-page">
  <div
    class="nk-page-background op-5 home-page__background"
    data-bg-mp4="assets/videos/fire/bg-2.mp4"
    data-bg-webm=""
    data-bg-ogv=""
    data-bg-poster="assets/videos/fire/bg-2.jpg"
    aria-hidden="true">
    <video
      #homeBackgroundVideo
      class="nk-page-background__video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      (loadeddata)="ensureVideoPlayback()"
      (canplay)="ensureVideoPlayback()"
      poster="assets/videos/fire/bg-2.jpg">
      <source src="assets/videos/fire/bg-2.mp4" type="video/mp4" />
    </video>
  </div>

  <app-hero-home
    class="home-page__content"
    [slides]="heroSlides"
    [headerImageSrc]="'assets/images/app/hero/hero2.jpg'"
    [syncHeaderWithActiveSlide]="false">
  </app-hero-home>

  <div style="height: 700px;"></div>
</section>
